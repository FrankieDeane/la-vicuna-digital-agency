[build]
  publish = "."

# ---------------------------------------------------------------------------
# Cabeceras de seguridad globales (se aplican a todo el sitio)
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Fuerza HTTPS en el navegador durante 2 años (evita ataques de downgrade
    # y man-in-the-middle). "preload" lo habilita antes de la primera visita.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Impide que el sitio sea embebido en un <iframe> de otro dominio
    # (proteccion contra clickjacking).
    X-Frame-Options = "DENY"

    # Evita que el navegador "adivine" el tipo de archivo (proteccion MIME-sniffing).
    X-Content-Type-Options = "nosniff"

    # No filtra la URL completa a sitios externos.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Desactiva APIs sensibles del navegador que el sitio no usa.
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"

    # Aisla el sitio de otras ventanas/pestanas (proteccion contra ataques
    # cross-origin como Spectre / tabnabbing).
    Cross-Origin-Opener-Policy = "same-origin"

    # Content Security Policy: define exactamente que recursos puede cargar el
    # sitio. Bloquea la inyeccion de scripts maliciosos (XSS).
    #   script-src 'self'           -> solo scripts propios (js/main.js)
    #   style-src ... fonts...       -> estilos propios + Google Fonts
    #   font-src ... gstatic         -> fuentes de Google
    #   img-src 'self' data: https:  -> imagenes propias, data-URI y https
    #   frame-src https:             -> previews de portfolio (sitios externos)
    #   frame-ancestors 'none'       -> nadie puede embeber este sitio
    #   object-src 'none'            -> sin Flash/plugins
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self'; frame-src https:; upgrade-insecure-requests"

# ---------------------------------------------------------------------------
# Cache agresivo para assets estaticos (imagenes, etc.)
# ---------------------------------------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
